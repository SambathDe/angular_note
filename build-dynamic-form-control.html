<div class="main-container mt-3">
                  @if (subjectArr.length > 0) {
                  <form [formGroup]="subjectFormGroup"
                      style="font-family: 'Segoe UI Variable', 'KhmerOSBattambang'; padding-bottom: 20px;">
                      <div class="row">
                          @for (subject of subjectArr; track subject; let i = $index) {
                          <div class="col-lg-3 d-flex flex-column gap-2">
                              <div class="form-group">
                                  <label class="form-label mb-2 mt-3">{{ subject?.name_kh | translate }} ({{ subject?.maxScore
                                      }}<sup>pt</sup>)</label>
                                  <mat-form-field appearance="outline" class="w-100 text-center">
                                      <input matInput type="number"  [formControlName]="subject?.name_en"/>
                                  </mat-form-field>
                              </div>
                          </div>
                          }
  
                          <div class="col-lg-12 d-flex flex-column gap-2">
                              <div style="width: 100%">
                                  <label class="form-label mb-2 mt-3">{{ "comment" | translate }}</label>
                                  <mat-form-field appearance="outline" class="w-100">
                                      <textarea matInput formControlName="comment"></textarea>
                                  </mat-form-field>
                              </div>
                          </div>
                      </div>
                  </form>
                  <div class="d-flex justify-content-end">
                      <button mat-flat-button (click)="onSaveScore()">
                          <mat-icon>save</mat-icon>{{ "save" | translate }}
                      </button>
                  </div>
                  } @else {
                  <ng-container>
                      <div class="no-data-placeholder">
                          <mat-icon>folder</mat-icon>
                          <span>{{ "empty_data" | translate }}</span>
                      </div>
                  </ng-container>
                  }
              </div>
